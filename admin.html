<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Tech | Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020c1b;
      --bg2: #041432;
      --panel: #071e40;
      --border: rgba(59, 130, 246, 0.2);
      --accent: #3b82f6;
      --text: #fff;
      --text-muted: #94a3b8;
      --font-h: 'Montserrat', sans-serif;
      --font-b: 'Inter', sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--bg);
      background-image: linear-gradient(rgba(2, 12, 27, 0.82), rgba(2, 12, 27, 0.88)), url('https://images.unsplash.com/photo-1553877522-43269d4ea984?w=1920&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text);
      font-family: var(--font-b);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Navbar */
    .navbar {
      background-color: rgba(2, 12, 27, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .nav-logo {
      font-family: var(--font-h);
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.1em;
    }
    
    .nav-logo span { color: var(--accent); }
    
    .nav-user {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .logout-btn {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.4rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: 0.2s;
    }
    
    .logout-btn:hover {
      background-color: var(--accent);
      color: #000;
    }
    
    /* Main Content */
    .container {
      flex: 1;
      max-width: 1000px;
      margin: 3rem auto;
      width: 100%;
      padding: 0 2rem;
    }
    
    .header {
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    
    .title {
      font-family: var(--font-h);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    
    .action-btn {
      background: none;
      border: 1px solid var(--text-muted);
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 4px;
      transition: 0.2s;
    }
    
    .action-btn:hover {
      color: var(--text);
      border-color: var(--text);
    }
    
    /* Requests Grid */
    .requests-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }
    
    .request-card {
      background-color: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 1.5rem;
      transition: 0.2s;
    }
    
    .request-card:hover {
      border-color: var(--border);
    }
    
    .req-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .req-id {
      font-family: var(--font-h);
      font-weight: 700;
      color: var(--accent);
      font-size: 1.1rem;
    }
    
    .req-date {
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    
    .req-detail {
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
    }
    
    .req-detail strong {
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      display: inline-block;
      width: 100px;
    }
    
    .tag {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .tag.Normal { background: rgba(255, 255, 255, 0.1); color: #fff; }
    .tag.High { background: rgba(255, 165, 0, 0.2); color: orange; }
    .tag.Critical { background: rgba(255, 0, 0, 0.2); color: #ff4444; }
    
    .req-desc-box {
      margin-top: 1rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 1rem;
      border-radius: 4px;
      font-size: 0.9rem;
      color: #ddd;
      line-height: 1.5;
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
      background-color: var(--panel);
      border-radius: 8px;
      border: 1px dashed rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo"><span>T</span>-TECH</a>
    <div class="nav-user">
      <span id="userDisplay">Admin</span>
      <button class="logout-btn" onclick="logout()">Disconnect</button>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <div>
        <h1 class="title">Command Center</h1>
        <p class="subtitle">Review incoming specialist requests and deployments.</p>
      </div>
      <button class="action-btn" onclick="clearRequests()">Clear Records</button>
    </div>

    <div class="requests-grid" id="requestsContainer">
      <!-- Requests will be injected here -->
    </div>
  </div>

  <script>
    // Authentication Check
    const currentUser = localStorage.getItem('ttech_current_user');
    const admins = ['smilee@t-tech.com', 'pato@t-tech.com', 'tollar@t-tech.com', 'admin@t-tech.com'];
    
    if (!currentUser) {
      window.location.href = 'login.html';
    } else if (!admins.includes(currentUser)) {
      window.location.href = 'dashboard.html'; // Non-admins go to dashboard
    } else {
      document.getElementById('userDisplay').textContent = currentUser;
      loadRequests();
    }

    function logout() {
      localStorage.removeItem('ttech_current_user');
      window.location.href = 'login.html';
    }

    function loadRequests() {
      const container = document.getElementById('requestsContainer');
      const requests = JSON.parse(localStorage.getItem('ttech_requests')) || [];
      
      if (requests.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No Active Requests</h3>
            <p>The Service Bay is currently empty.</p>
          </div>
        `;
        return;
      }
      
      // Sort newest first
      requests.reverse();
      
      container.innerHTML = requests.map(req => `
        <div class="request-card">
          <div class="req-header">
            <div class="req-id">${req.id}</div>
            <div class="req-date">${req.date}</div>
          </div>
          <div class="req-detail"><strong>Client:</strong> ${req.user}</div>
          <div class="req-detail"><strong>Category:</strong> ${req.type}</div>
          <div class="req-detail"><strong>Urgency:</strong> <span class="tag ${req.urgency}">${req.urgency}</span></div>
          <div class="req-desc-box">
            ${req.desc.replace(/\\n/g, '<br>')}
          </div>
        </div>
      `).join('');
    }
    
    function clearRequests() {
      if(confirm('Are you sure you want to clear all request records?')) {
        localStorage.removeItem('ttech_requests');
        loadRequests();
      }
    }
  </script>
</body>
</html>
