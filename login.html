<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Tech | Enter Environment</title>
  <meta name="description" content="T-Tech Specialist Ecosystem Login">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Clean, non-glassmorphic login styling */
    body {
      background-color: var(--bg-solid);
      background-image: linear-gradient(rgba(2, 12, 27, 0.82), rgba(2, 12, 27, 0.88)), url('https://images.unsplash.com/photo-1553877522-43269d4ea984?w=1920&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 12, 27, 0.6); /* Solid dark overlay */
      z-index: 0;
    }
    
    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 450px;
      padding: 3rem;
      background-color: rgba(7, 30, 64, 0.85);
      border: 1px solid rgba(59, 130, 246, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    
    .login-logo {
      font-family: var(--font-head);
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--white);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 0.5rem;
    }
    
    .login-logo .logo-e {
      color: #3b82f6;
    }
    
    .login-title {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    
    .login-sub {
      color: var(--grey-light);
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      font-size: 0.75rem;
      color: var(--grey-light);
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .form-control {
      width: 100%;
      background-color: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--white);
      padding: 1rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      border-radius: 4px;
      transition: border-color 0.2s, background-color 0.2s;
    }
    
    .form-control:focus {
      outline: none;
      border-color: #3b82f6;
      background-color: rgba(59, 130, 246, 0.05);
    }
    
    .btn-submit {
      width: 100%;
      background-color: #3b82f6;
      color: #fff;
      border: none;
      padding: 1.2rem;
      font-family: var(--font-head);
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 1rem;
      transition: background-color 0.2s, transform 0.1s;
    }
    
    .btn-submit:hover {
      background-color: #60a5fa;
    }
    
    .btn-submit:active {
      transform: translateY(1px);
    }
    
    .back-link {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: var(--grey-light);
      font-size: 0.8rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    
    .back-link:hover {
      color: #3b82f6;
    }
  </style>
</head>

<body>
  <div class="overlay"></div>
  
  <div class="login-container">
    <div class="login-header">
      <a href="index.html" class="login-logo"><span class="logo-e">T</span>-TECH</a>
      <h1 class="login-title">Enter Environment</h1>
      <p class="login-sub">Identify yourself to access the Service Bay.</p>
    </div>
    
    <form id="auth-gate" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="userEmail">Email Address</label>
        <input type="email" id="userEmail" class="form-control" placeholder="specialist@t-tech.com" required>
      </div>
      
      <div class="form-group">
        <label for="userPhone">Phone Number</label>
        <input type="tel" id="userPhone" class="form-control" placeholder="e.g. 07..." required>
      </div>
      
      <div class="form-group">
        <label for="userPass">Password</label>
        <input type="password" id="userPass" class="form-control" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn-submit">Initialize Access</button>
    </form>
    
    <a href="index.html" class="back-link">← Back to System</a>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('userEmail').value.trim().toLowerCase();
      
      // Admin whitelisted emails
      const admins = ['smilee@t-tech.com', 'pato@t-tech.com', 'tollar@t-tech.com', 'admin@t-tech.com'];
      
      // Store current user in localStorage to simulate session
      localStorage.setItem('ttech_current_user', email);
      
      if (admins.includes(email)) {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }
  </script>
</body>
</html>
